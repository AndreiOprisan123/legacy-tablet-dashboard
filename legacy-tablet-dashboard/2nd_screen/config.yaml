name: "Legacy Tablet Dashboard 2"
slug: "legacy_tablet_2"
version: "1.0.6"
description: "Instance 2: Display Home Assistant or any URL on old tablets and fridges."
url: "https://github.com/AndreiOprisan123/legacy-tablet-dashboard"
startup: application
boot: auto
init: false
arch:
  - aarch64
  - amd64
  - armv7
ports:
  "5801/tcp": 5801
webui: "http://[HOST]:[PORT:5801]/"
options:
  url: "http://homeassistant.local:8123"
  touch_optimization: true
schema:
  url: str
  touch_optimization: bool